name: Build Windows EXE Installer

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  build-windows:
    name: Build Windows Installer
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build JAR with Maven
        run: mvn clean package -DskipTests

      - name: Create Runtime Image with jlink
        run: mvn javafx:jlink

      - name: Create Windows EXE Installer
        run: mvn jpackage:jpackage

      - name: List build artifacts
        run: |
          echo "Build artifacts:"
          dir target\dist

      - name: Upload EXE Installer
        uses: actions/upload-artifact@v4
        with:
          name: OblikPodorojList-Windows-Installer
          path: target/dist/*.exe
          retention-days: 30

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: OblikPodorojList-JAR
          path: target/*-shaded.jar
          retention-days: 30

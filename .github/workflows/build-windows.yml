name: Build Windows EXE Wrapper

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  build-windows:
    name: Build Windows EXE
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build JAR and EXE with Maven
        run: mvn clean package -DskipTests

      - name: List build artifacts
        run: |
          echo "Build artifacts:"
          dir target

      - name: Upload EXE Wrapper
        uses: actions/upload-artifact@v4
        with:
          name: OblikPodorojList-Windows-EXE
          path: target/OblikPodorojList.exe
          retention-days: 30

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: OblikPodorojList-JAR
          path: target/*-shaded.jar
          retention-days: 30

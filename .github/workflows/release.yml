name: Create Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  create-release:
    name: Create Release with Windows EXE
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Extract version from tag
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Update version in pom.xml
        shell: bash
        run: |
          sed -i "s/<version>1.0-SNAPSHOT<\/version>/<version>${VERSION}<\/version>/" pom.xml
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}

      - name: Build JAR and EXE with Maven
        run: mvn clean package -DskipTests

      - name: Rename EXE with version
        shell: bash
        run: |
          cp target/OblikPodorojList.exe target/OblikPodorojList-${{ steps.version.outputs.VERSION }}.exe

      - name: List build artifacts
        run: |
          echo "Build artifacts:"
          dir target

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            target/OblikPodorojList-${{ steps.version.outputs.VERSION }}.exe
            target/*-shaded.jar
          body: |
            ## OblikPodorojList ${{ steps.version.outputs.VERSION }}
            
            ### 📦 Файли для завантаження:
            
            **Windows EXE (.exe):**
            - Простий wrapper навколо JAR файлу
            - Розмір: ~50-70 MB
            - Потрібна Java 17+ на комп'ютері
            - Запуск: подвійний клік на .exe
            
            **JAR файл:**
            - Універсальний (Windows, macOS, Linux)
            - Розмір: ~50-70 MB
            - Потрібна Java 17 або новіша
            - Запуск: `java -jar OblikPodorojList-${{ steps.version.outputs.VERSION }}-shaded.jar`
            
            ### 📋 Системні вимоги:
            - **Java 17+** (завантажити: https://adoptium.net/)
            - Windows 10/11, macOS, або Linux
            
            ### 🗄️ База даних:
            - MySQL 8.0 (Docker або локальна установка)
            - Налаштування в `config.properties`
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

name: Build Windows EXE
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: windows-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: 'maven'
    - name: Build with Maven
      run: mvn clean package -DskipTests
    - name: Upload EXE
      uses: actions/upload-artifact@v4
      with:
        name: OblikPodorojList-EXE
        path: target/OblikPodorojList.exe
    - name: Upload JAR
      uses: actions/upload-artifact@v4
      with:
        name: OblikPodorojList-JAR
        path: target/OblikPodorojList-1.0-SNAPSHOT-shaded.jar

name: Build JavaFX EXE for Windows

on:
  push:
    branches: [ main ] # Скрипт спрацює при змінах у main

jobs:
  build:
    runs-on: windows-latest # Важливо: білдимо саме на Windows-сервері

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 23
        uses: actions/setup-java@v4
        with:
          java-version: '23'
          distribution: 'oracle'
          cache: 'maven' # або 'gradle', якщо використовуєте його

      - name: Build with Maven
        run: mvn clean package # Створює JAR файл у папці target/

      - name: Create EXE with jpackage
        run: |
          jpackage --type exe `
            --dest dist `
            --name "program" `
            --input target/ `
            --main-jar OblikPodorojList-1.0-SNAPSHOT.jar `
            --main-class com.work.oblikpodorojlist.Main `
            --win-shortcut `
            --win-menu
        # УВАГА: Замініть project-1.0-SNAPSHOT.jar на назву вашого файлу
        # та com.example.Main на ваш головний клас

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-executable
          path: dist/program.exe